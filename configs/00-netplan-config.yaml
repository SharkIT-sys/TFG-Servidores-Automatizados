# Ejemplo de configuración Netplan para el servidor DNS (192.168.1.111)
# Los servidores DHCP (112) y WEB (114) siguen una estructura idéntica.

network:
  version: 2
  renderer: networkd
  ethernets:
    enp0s17:
      dhcp4: false
      addresses:
        - 192.168.1.111/24
      routes:
        - to: default
          via: 192.168.1.1
      nameservers:
        addresses:
          - 8.8.8.8
          - 8.8.4.4
